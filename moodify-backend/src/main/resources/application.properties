spring.application.name=moodify-backend

# ── Server ────────────────────────────────────────────────────────────────────
# Render injects PORT env var; fall back to 8080 for local dev
server.port=${PORT:8080}

# ── MySQL Database ────────────────────────────────────────────────────────────
# Set DB_URL, DB_USERNAME, DB_PASSWORD as environment variables on Render
# Local dev fallback uses localhost MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/moodify_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool — important for Render's ephemeral containers
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# Set JWT_SECRET as environment variable on Render (min 32 chars)
jwt.secret=${JWT_SECRET:moodify_super_secret_key_2024_production_ready_256bit_secure_key_abcdefghij}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Mail ──────────────────────────────────────────────────────────────────────
# Set MAIL_USERNAME and MAIL_PASSWORD as environment variables on Render
# Mail is optional — app starts fine without it (notifications just won't send)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@moodify.app}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── CORS ──────────────────────────────────────────────────────────────────────
# Set FRONTEND_URL to your Vercel deployment URL on Render
# e.g. https://moodify.vercel.app
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:5174}

# ── Gemini AI ─────────────────────────────────────────────────────────────────
# Set GEMINI_API_KEY as environment variable on Render
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.moodify=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
